<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d5cf7"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="170" x2="512" y2="170" stroke="#7c3aed" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="0" y1="340" x2="512" y2="340" stroke="#7c3aed" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="170" y1="0" x2="170" y2="512" stroke="#7c3aed" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="340" y1="0" x2="340" y2="512" stroke="#7c3aed" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Vault door outer ring -->
  <circle cx="256" cy="248" r="148" fill="none" stroke="url(#grad1)" stroke-width="6" opacity="0.4"/>

  <!-- Vault door body -->
  <circle cx="256" cy="248" r="130" fill="#12121a"/>
  <circle cx="256" cy="248" r="130" fill="none" stroke="url(#grad1)" stroke-width="10"/>

  <!-- Vault door inner ring -->
  <circle cx="256" cy="248" r="100" fill="none" stroke="url(#grad1)" stroke-width="4" opacity="0.6"/>

  <!-- Dial handle lines (vault combination lock look) -->
  <line x1="256" y1="148" x2="256" y2="178" stroke="url(#grad2)" stroke-width="5" stroke-linecap="round"/>
  <line x1="356" y1="248" x2="326" y2="248" stroke="url(#grad2)" stroke-width="5" stroke-linecap="round"/>
  <line x1="256" y1="348" x2="256" y2="318" stroke="#252538" stroke-width="5" stroke-linecap="round"/>
  <line x1="156" y1="248" x2="186" y2="248" stroke="#252538" stroke-width="5" stroke-linecap="round"/>

  <!-- Diagonal tick marks -->
  <line x1="326" y1="178" x2="305" y2="199" stroke="url(#grad2)" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="326" y1="318" x2="305" y2="297" stroke="#252538" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="186" y1="178" x2="207" y2="199" stroke="#252538" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="186" y1="318" x2="207" y2="297" stroke="#252538" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

  <!-- Center dial -->
  <circle cx="256" cy="248" r="46" fill="#1a1a27" stroke="url(#grad1)" stroke-width="6" filter="url(#glow)"/>
  <circle cx="256" cy="248" r="32" fill="url(#grad1)" opacity="0.9"/>

  <!-- Lock symbol inside center -->
  <rect x="245" y="247" width="22" height="16" rx="3" fill="white" opacity="0.95"/>
  <path d="M249 247 v-5 a7 7 0 0 1 14 0 v5" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.95"/>
  <circle cx="256" cy="254" r="2.5" fill="#1a1a27"/>

  <!-- Vault handle bar -->
  <rect x="368" y="236" width="36" height="24" rx="12" fill="url(#grad1)" opacity="0.85"/>

  <!-- Bottom "FV" wordmark -->
  <text x="256" y="436" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="52" font-weight="700" fill="url(#grad2)" text-anchor="middle" letter-spacing="6" opacity="0.95">FV</text>
</svg>
